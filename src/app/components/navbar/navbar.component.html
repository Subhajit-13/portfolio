<header class="navbar" [class.scrolled]="scrolled">
  <div class="container nav-inner">

    <a class="nav-logo" (click)="scrollTo('#hero')">
      <span class="logo-dot"></span>
      {{ name.split(' ')[0] }}<span class="logo-accent">.</span>
    </a>

    <nav class="nav-links desktop-nav">
      <a
        *ngFor="let link of navLinks"
        class="nav-link"
        (click)="scrollTo(link.href)">
        {{ link.label }}
      </a>
    </nav>

    <button class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <nav>
      <a
        *ngFor="let link of navLinks"
        class="mobile-nav-link"
        (click)="scrollTo(link.href)">
        {{ link.label }}
      </a>
    </nav>
  </div>
</header>
