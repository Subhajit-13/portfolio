<section id="projects" class="section">
  <div class="container">

    <div class="projects-header">
      <div>
        <p class="section-label">Projects</p>
        <h2 class="section-title">Things I've Built</h2>
        <p class="section-subtitle">
          A selection of projects that show what I can do — and what I'm still learning.
        </p>
      </div>
      <button
        class="btn btn-ghost"
        (click)="showAll = !showAll"
        *ngIf="projects.length > visibleProjects.length || showAll">
        {{ showAll ? 'Show Less' : 'View All (' + projects.length + ')' }}
      </button>
    </div>

    <div class="projects-grid">
      <div class="project-card card" *ngFor="let proj of visibleProjects">

        <div class="project-top">
          <div class="project-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polyline points="16 18 22 12 16 6"></polyline>
              <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
          </div>
          <div class="project-links">
            <a
              *ngIf="proj.github"
              [href]="proj.github"
              target="_blank"
              class="icon-link"
              title="GitHub">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
            </a>
            <a
              *ngIf="proj.live"
              [href]="proj.live"
              target="_blank"
              class="icon-link"
              title="Live Demo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>

        <div class="project-status" [style.color]="statusColor(proj.status)">
          {{ statusLabel(proj.status) }}
        </div>

        <h3 class="project-title">{{ proj.title }}</h3>
        <p class="project-desc">{{ proj.description }}</p>

        <div class="project-tech">
          <span class="tag" *ngFor="let t of proj.tech">{{ t }}</span>
        </div>

      </div>
    </div>

  </div>
</section>
