<section id="contact" class="section" *ngIf="personal">
  <div class="container">

    <div class="contact-grid">

      <!-- Left: info -->
      <div class="contact-info">
        <p class="section-label">Contact</p>
        <h2 class="section-title">Let's Talk</h2>
        <p class="contact-blurb">
          Whether you have a role in mind, a project idea, or just want to connect —
          my inbox is always open. I'll get back to you as soon as I can.
        </p>

        <div class="contact-links">
          <a
            *ngFor="let link of contactLinks"
            [href]="link.href"
            target="_blank"
            class="contact-link card">

            <!-- Email icon -->
            <span class="contact-link-icon" *ngIf="link.icon === 'email'">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>

            <!-- GitHub icon -->
            <span class="contact-link-icon" *ngIf="link.icon === 'github'">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
            </span>

            <!-- LinkedIn icon -->
            <span class="contact-link-icon" *ngIf="link.icon === 'linkedin'">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
            </span>

            <div class="contact-link-text">
              <span class="contact-link-label">{{ link.label }}</span>
              <span class="contact-link-value">{{ link.value }}</span>
            </div>

            <svg class="contact-link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- Right: form -->
      <div class="contact-form-wrap">

        <!-- Success state -->
        <div class="form-success card" *ngIf="submitted">
          <span class="success-icon">🎉</span>
          <h3>Message Sent!</h3>
          <p>Thanks for reaching out. I'll get back to you soon.</p>
          <button class="btn btn-ghost" (click)="submitted = false">Send Another</button>
        </div>

        <!-- Form -->
        <form class="contact-form card" *ngIf="!submitted" (ngSubmit)="onSubmit()">
          <h3 class="form-title">Send a Message</h3>

          <div class="form-row">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input
                id="name"
                type="text"
                placeholder="John Doe"
                [(ngModel)]="form.name"
                name="name"
                required />
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                id="email"
                type="email"
                placeholder="john@example.com"
                [(ngModel)]="form.email"
                name="email"
                required />
            </div>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input
              id="subject"
              type="text"
              placeholder="Job opportunity / Project collab / Just saying hi"
              [(ngModel)]="form.subject"
              name="subject" />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              rows="5"
              placeholder="Tell me what's on your mind..."
              [(ngModel)]="form.message"
              name="message"
              required>
            </textarea>
          </div>

          <button
            type="submit"
            class="btn btn-primary submit-btn"
            [disabled]="sending">
            <span *ngIf="!sending">
              Send Message
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </span>
            <span *ngIf="sending" class="sending-dots">
              Sending<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
            </span>
          </button>

        </form>
      </div>

    </div>
  </div>
</section>
